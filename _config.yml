title: "anniV Admin Support"
tagline: "Get organised. Stay organised. Breathe again."
description: "Quietly fixing the chaos for small businesses — invoices, documents, data and digital clutter."

url: "https://annivadmin.github.io"
baseurl: ""

theme: jekyll-theme-chirpy
lang: en
timezone: Europe/London

# Sidebar avatar (optional — remove if not used)
avatar: "/assets/img/avatar.png"

# Social links
social:
  name: "anniV Admin Support"
  email: ""
  links:
    - https://github.com/anniVAdmin

# Theme mode: light, dark, or empty for system default
theme_mode: light

# Pagination
paginate: 10

# Markdown + syntax highlighting
markdown: kramdown
highlighter: rouge

sass:
  style: compressed

assets:
  css:
    - /assets/css/custom.css

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Exclusions (keep these)
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
