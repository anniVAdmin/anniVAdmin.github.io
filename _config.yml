title: "anniV Admin Support"
tagline: "Get organised. Stay organised. Breathe again."
description: "Admin support, systems, and workflow clarity — delivered with calm, structure, and zero chaos."

url: "https://annivadmin.github.io"
baseurl: ""

theme: jekyll-theme-chirpy
theme_mode: light

# Social links
social:
  github: anniVAdmin
  linkedin: ""
  email: ""

# Enable Chirpy tabs
tabs: true

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  parse_block_html: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Theme settings
lang: en
timezone: Europe/London

sass:
  style: compressed

# Load your custom CSS (this was missing)
assets:
  css:
    - /assets/css/custom.css
