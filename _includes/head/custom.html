<!-- Load your custom stylesheet (keep this!) -->
<link rel="stylesheet" href="/assets/css/custom.css">

<style>
/* --- Wallpaper Enhancements for BODY Background --- */

body {
  position: relative;
  overflow: hidden;
}

/* Vignette (soft dark edges) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(
    circle at center,
    rgba(0,0,0,0) 45%,
    rgba(0,0,0,0.35) 100%
  );
  z-index: 1;
}

/* Bottom fade for readability */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.45) 100%
  );
  z-index: 2;
}

/* Ensure all content sits above overlays */
body > * {
  position: relative;
  z-index: 3;
}
</style>
<style>
/* --- Transparent Sidebar with Readability Layer --- */

/* Make sidebar background transparent */
.sidebar {
  background: rgba(0, 0, 0, 0.35) !important; /* adjust opacity as needed */
  backdrop-filter: blur(4px); /* optional: gives a frosted-glass effect */
}

/* Sidebar items stay readable */
.sidebar a,
.sidebar .site-title,
.sidebar .site-subtitle,
.sidebar .site-author-name {
  color: #ffffff !important;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
</style>
